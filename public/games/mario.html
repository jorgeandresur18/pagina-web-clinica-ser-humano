<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Super Mario Bros NES</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  #game { width:100%; height:100%; }

  #start-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.72);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; font-family: monospace;
  }
  .ov { text-align:center; color:#FFF; user-select:none; }
  .ov-icon  { font-size:36px; margin-bottom:12px; }
  .ov-title { font-size:15px; letter-spacing:0.14em; }
  .ov-blink {
    font-size:11px; letter-spacing:0.1em; color:#ff6b12; margin-top:10px;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
  <div id="game"></div>

  <div id="start-overlay">
    <div class="ov">
      <div class="ov-icon">🎮</div>
      <div class="ov-title">SUPER MARIO BROS</div>
      <div class="ov-blink">▶ TAP / CLICK PARA JUGAR ◀</div>
    </div>
  </div>

<script>
  EJS_player        = "#game";
  EJS_core          = "nes";
  EJS_gameUrl       = "/games/mario.nes";
  EJS_pathtodata    = "https://cdn.emulatorjs.org/stable/data/";
  EJS_startOnLoaded = true;
  EJS_color         = "#ff6b12";
  EJS_language      = "es";

  function focusCanvas() {
    var c = document.querySelector('canvas');
    if (c) { if (!c.getAttribute('tabindex')) c.setAttribute('tabindex','0'); c.focus(); }
  }

  var ov = document.getElementById('start-overlay');
  function dismiss() { ov.style.display='none'; focusCanvas(); }
  ov.addEventListener('click', dismiss);
  ov.addEventListener('touchend', function(e){ e.preventDefault(); dismiss(); }, {passive:false});
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
